name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v3
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Decode Keystore
        run: |
          echo "$KEYSTORE_B64" | base64 -d > gallery-release.keystore
        env:
          KEYSTORE_B64: 
      
      - name: Build
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/Android/src/gallery-release.keystore
          KEYSTORE_PASSWORD: androidreleasekey
          KEY_ALIAS: androidreleasekey
          KEY_PASSWORD: androidreleasekey
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gallery-app-release
          path: Android/src/app/build/outputs/apk/release/app-release.apk